<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>SAPI_OS_V2.4 | COMMAND_CENTER</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-container-low":"#151b2d","background":"#0c1324","outline":"#849396",
          "on-error-container":"#ffdad6","error-container":"#93000a",
          "on-tertiary-fixed-variant":"#43474c","surface-bright":"#33394c",
          "surface-container-high":"#23293c","on-error":"#690005",
          "inverse-surface":"#dce1fb","inverse-on-surface":"#2a3043",
          "secondary-fixed-dim":"#d0bcff","surface-container-lowest":"#070d1f",
          "error":"#ffb4ab","tertiary-container":"#cdd1d7",
          "tertiary-fixed-dim":"#c3c7cd","on-primary-fixed":"#001f24",
          "primary":"#c3f5ff","on-primary-container":"#00626e",
          "outline-variant":"#3b494c","on-surface-variant":"#bac9cc",
          "tertiary":"#e9edf3","surface":"#0c1324","on-secondary":"#3c0091",
          "on-primary-fixed-variant":"#004f58","on-secondary-fixed":"#23005c",
          "on-background":"#dce1fb","on-secondary-container":"#c4abff",
          "surface-dim":"#0c1324","primary-fixed":"#9cf0ff",
          "secondary-container":"#571bc1","secondary-fixed":"#e9ddff",
          "on-primary":"#00363d","tertiary-fixed":"#dfe3e9",
          "primary-fixed-dim":"#00daf3","surface-variant":"#2e3447",
          "on-surface":"#dce1fb","primary-container":"#00e5ff",
          "secondary":"#d0bcff","on-tertiary":"#2c3136",
          "surface-container":"#191f31","on-secondary-fixed-variant":"#5516be",
          "surface-container-highest":"#2e3447","on-tertiary-container":"#555a5f"
        },
        fontFamily: { "headline":["Space Grotesk"], "body":["Inter"], "label":["Space Grotesk"] },
        borderRadius: { "DEFAULT":"0px", "lg":"0px", "xl":"0px", "full":"9999px" },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .flicker-in-place { animation: flicker 2s infinite; }
  @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0.8} 52%{opacity:1} 54%{opacity:0.7} 56%{opacity:1} }
</style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 overflow-hidden h-screen flex flex-col">
<script>if(sessionStorage.getItem('sapi_auth')!=='ok') location.href='/login';</script>

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0c1324]/60 backdrop-blur-xl border-b border-[#00E5FF]/20 shadow-[0_0_25px_rgba(0,218,243,0.15)]">
  <div class="flex items-center gap-4">
    <span class="material-symbols-outlined text-[#00E5FF]">terminal</span>
    <span class="text-xl font-bold tracking-tighter text-[#00E5FF] drop-shadow-[0_0_8px_rgba(0,229,255,0.4)] font-headline">SAPI_OS_V2.4</span>
  </div>
  <div class="flex items-center gap-6">
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></span>
      <span class="font-label uppercase text-[10px] tracking-widest text-primary">System: Online</span>
    </div>
    <a href="/login" onclick="sessionStorage.removeItem('sapi_auth')" class="h-8 w-8 bg-surface-variant border border-primary/20 flex items-center justify-center hover:bg-primary/10 transition-colors" title="Logout">
      <span class="material-symbols-outlined text-sm text-primary">logout</span>
    </a>
  </div>
</header>

<div class="flex flex-1 pt-16 h-full">
  <!-- NavigationDrawer -->
  <nav class="fixed left-0 top-16 bottom-0 z-40 flex flex-col items-center py-8 bg-[#0c1324] border-r border-[#00E5FF]/10 w-24">
    <div class="space-y-8 w-full flex flex-col items-center">
      <a href="/dashboard" class="text-[#dce1fb]/40 py-4 w-full flex flex-col items-center gap-1 hover:bg-[#00E5FF]/5 hover:text-[#00E5FF] scale-95 active:scale-90 transition-transform">
        <span class="material-symbols-outlined">grid_view</span>
        <span class="font-['Space_Grotesk'] font-medium text-[10px] tracking-widest">DASHBOARD</span>
      </a>
      <a href="/command" class="bg-[#00E5FF]/15 text-[#00E5FF] border-l-2 border-[#00E5FF] py-4 w-full flex flex-col items-center gap-1 scale-95 active:scale-90 transition-transform">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">lightbulb_circle</span>
        <span class="font-['Space_Grotesk'] font-medium text-[10px] tracking-widest">DEVICE_ARRAY</span>
      </a>
      <a href="/voice" class="text-[#dce1fb]/40 py-4 w-full flex flex-col items-center gap-1 hover:bg-[#00E5FF]/5 hover:text-[#00E5FF] scale-95 active:scale-90 transition-transform">
        <span class="material-symbols-outlined">mic_none</span>
        <span class="font-['Space_Grotesk'] font-medium text-[10px] tracking-widest">VOICE_MODE</span>
      </a>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="ml-24 flex-1 p-8 overflow-y-auto">
    <div class="max-w-7xl mx-auto">
      <!-- Control Bar -->
      <div class="mb-6 flex flex-wrap items-center gap-3">
        <div class="relative flex-1 min-w-[200px] max-w-sm">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">search</span>
          <input id="q" placeholder="SEARCH_DEVICE..." class="w-full pl-10 pr-4 py-3 bg-surface-container border border-outline-variant/30 text-on-surface font-label text-sm tracking-widest placeholder:text-outline/40 focus:outline-none focus:border-primary/60" oninput="debounceSearch()" />
        </div>
        <button onclick="load()" class="px-5 py-3 bg-primary-container text-on-primary font-headline font-bold text-xs tracking-widest uppercase shadow-[0_0_15px_rgba(0,229,255,0.3)] hover:brightness-110 active:scale-95 transition-all flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">refresh</span> REFRESH
        </button>
        <button onclick="scan()" class="px-5 py-3 border border-outline-variant/40 text-on-surface font-headline text-xs tracking-widest uppercase hover:bg-surface-container-highest transition-all flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">radar</span> SCAN_DEVICE
        </button>
        <button onclick="all('on')" class="px-5 py-3 border border-primary/30 text-primary font-headline text-xs tracking-widest uppercase hover:bg-primary/10 transition-all flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">power</span> ALL_ON
        </button>
        <button onclick="all('off')" class="px-5 py-3 border border-error/30 text-error font-headline text-xs tracking-widest uppercase hover:bg-error/10 transition-all flex items-center gap-2">
          <span class="material-symbols-outlined text-sm">power_off</span> ALL_OFF
        </button>
      </div>

      <!-- Group Tabs -->
      <div id="groupTabs" class="mb-4 flex flex-wrap gap-2"></div>

      <!-- Status Message -->
      <p id="msg" class="mb-4 font-label text-[10px] tracking-widest text-primary/60 uppercase"></p>

      <!-- Device Grid -->
      <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Skeleton placeholders shown on first load -->
        <div class="skeleton-card bg-surface-container-low border border-outline-variant/20 p-6 flex flex-col justify-between h-44 animate-pulse"><div class="flex justify-between items-start"><div class="w-8 h-8 bg-outline/20"></div><div class="w-10 h-5 bg-outline/20"></div></div><div class="space-y-2"><div class="w-3/4 h-4 bg-outline/20"></div><div class="w-1/2 h-3 bg-outline/10"></div></div></div>
        <div class="skeleton-card bg-surface-container-low border border-outline-variant/20 p-6 flex flex-col justify-between h-44 animate-pulse"><div class="flex justify-between items-start"><div class="w-8 h-8 bg-outline/20"></div><div class="w-10 h-5 bg-outline/20"></div></div><div class="space-y-2"><div class="w-3/4 h-4 bg-outline/20"></div><div class="w-1/2 h-3 bg-outline/10"></div></div></div>
        <div class="skeleton-card bg-surface-container-low border border-outline-variant/20 p-6 flex flex-col justify-between h-44 animate-pulse"><div class="flex justify-between items-start"><div class="w-8 h-8 bg-outline/20"></div><div class="w-10 h-5 bg-outline/20"></div></div><div class="space-y-2"><div class="w-3/4 h-4 bg-outline/20"></div><div class="w-1/2 h-3 bg-outline/10"></div></div></div>
        <div class="skeleton-card bg-surface-container-low border border-outline-variant/20 p-6 flex flex-col justify-between h-44 animate-pulse"><div class="flex justify-between items-start"><div class="w-8 h-8 bg-outline/20"></div><div class="w-10 h-5 bg-outline/20"></div></div><div class="space-y-2"><div class="w-3/4 h-4 bg-outline/20"></div><div class="w-1/2 h-3 bg-outline/10"></div></div></div>
      </div>
    </div>
  </main>
</div>

<!-- Edge highlights -->
<div class="fixed top-0 left-0 w-full h-[1px] bg-primary/20 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-full h-[1px] bg-primary/10 pointer-events-none"></div>
<div class="fixed top-0 left-0 h-full w-[1px] bg-primary/10 pointer-events-none"></div>

<!-- Device Edit Modal -->
<div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
  <div class="bg-surface-container border border-primary/30 shadow-[0_0_40px_rgba(0,229,255,0.15)] p-8 w-full max-w-md mx-4">
    <h3 id="modalTitle" class="font-headline text-xl font-bold text-primary tracking-widest mb-6">NEW_DEVICE_DETECTED</h3>
    <p id="modalMac" class="font-label text-[10px] tracking-widest text-outline mb-6">MAC: --</p>
    <div class="space-y-4 mb-8">
      <div>
        <label class="font-label text-[10px] tracking-widest text-on-surface-variant uppercase block mb-1">UNIQUE_ID</label>
        <input id="modalUid" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant/30 text-on-surface font-label text-sm tracking-widest placeholder:text-outline/40 focus:outline-none focus:border-primary/60" placeholder="e.g. lampu_dapur_1" />
      </div>
      <div>
        <label class="font-label text-[10px] tracking-widest text-on-surface-variant uppercase block mb-1">DEVICE_NAME</label>
        <input id="modalName" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant/30 text-on-surface font-label text-sm tracking-widest placeholder:text-outline/40 focus:outline-none focus:border-primary/60" placeholder="e.g. Lampu Dapur 1" />
      </div>
    </div>
    <p id="modalErr" class="font-label text-[10px] tracking-widest text-error mb-4 hidden"></p>
    <div class="flex gap-4">
      <button onclick="closeModal()" class="flex-1 px-6 py-3 border border-outline-variant/40 text-on-surface font-headline text-xs tracking-widest uppercase hover:bg-surface-container-highest transition-all">CANCEL</button>
      <button onclick="saveDevice()" id="modalSave" class="flex-1 px-6 py-3 bg-primary-container text-on-primary font-headline font-bold text-xs tracking-widest uppercase shadow-[0_0_15px_rgba(0,229,255,0.3)] hover:brightness-110 active:scale-95 transition-all">SAVE</button>
    </div>
  </div>
</div>

<script>
  let devices = [];
  const loading = new Set();
  let initialLoad = true;
  let searchTimer = null;
  let pressTimer = null;
  let modalMac = null;
  let activeGroup = 'all';   // 'all' | 'ungroup' | group name
  let allGroups = [];        // distinct group names from last full load

  function debounceSearch() {
    clearTimeout(searchTimer);
    msg('WAITING_FOR_INPUT...');
    searchTimer = setTimeout(() => load(), 500);
  }

  async function load() {
    const q = document.getElementById('q').value || '';
    if (initialLoad) msg('LOADING_DEVICES...');
    try {
      const params = new URLSearchParams({ search: q });
      if (activeGroup !== 'all') params.set('group', activeGroup);
      const res = await fetch('/api/devices?' + params.toString());
      const data = await res.json();
      devices = data.data || [];

      // Rebuild group list only on unfiltered load so tabs don't flicker
      if (activeGroup === 'all' && !q) {
        const seen = new Set();
        allGroups = [];
        for (const d of devices) {
          const g = (d.group || '').trim();
          if (g && !seen.has(g)) { seen.add(g); allGroups.push(g); }
        }
        renderTabs();
      }

      render();
      msg('LOADED ' + devices.length + ' DEVICE' + (devices.length !== 1 ? 'S' : ''));
      // Auto-prompt for new devices without unique_id/name
      const newDevices = devices.filter(d => !d.unique_id && !d.name);
      if (newDevices.length > 0) {
        openModal(newDevices[0].mac, '', '', true);
      }
    } catch (e) { msg('LOAD_FAILED: ' + e.message); render(); }
    finally { initialLoad = false; }
  }

  function renderTabs() {
    const tabs = ['all', 'ungroup', ...allGroups];
    document.getElementById('groupTabs').innerHTML = tabs.map(t => {
      const isActive = t === activeGroup;
      const label = t === 'all' ? 'ALL' : t === 'ungroup' ? 'UNGROUP' : t.toUpperCase();
      return `<button onclick="setGroup('${t.replace(/'/g, "\\'")}')"
        class="px-4 py-1.5 font-label text-[10px] tracking-widest uppercase transition-all ${
          isActive
            ? 'bg-primary-container text-on-primary shadow-[0_0_10px_rgba(0,229,255,0.3)]'
            : 'border border-outline-variant/40 text-on-surface-variant hover:border-primary/40 hover:text-primary'
        }">${label}</button>`;
    }).join('');
  }

  function setGroup(g) {
    activeGroup = g;
    renderTabs();
    load();
  }

  function render() {
    document.getElementById('grid').innerHTML = devices.map(d => {
      const isOn = d.status === 'on';
      const isLoading = loading.has(d.unique_id || d.mac);
      const isNew = !d.unique_id && !d.name;
      const name = (d.name || d.unique_id || d.ip || 'UNKNOWN').toUpperCase().replace(/\s+/g, '_');
      const stateLabel = isLoading
        ? '<span class="inline-flex items-center gap-1"><span class="inline-block w-2 h-2 border border-current border-t-transparent rounded-full animate-spin"></span> PROCESSING...</span>'
        : isNew ? 'NEW_DEVICE \u2014 TAP TO CONFIGURE' : 'STATE: ' + d.status.toUpperCase();
      const esc = s => (s || '').replace(/'/g, "\\'");
      return `<div class="${isNew ? 'bg-secondary-container/20 border border-secondary/40 shadow-[0_0_15px_rgba(208,188,255,0.1)]' : isOn ? 'bg-primary/10 border border-primary/40 shadow-[0_0_15px_rgba(0,229,255,0.1)]' : 'bg-surface-container-low border border-outline-variant/20 hover:border-primary/40 transition-colors'} p-6 flex flex-col justify-between h-44 group transition-all duration-200 ${isLoading ? 'opacity-60' : 'cursor-pointer active:scale-[0.98]'}"
             ${isNew ? `onclick="openModal('${esc(d.mac)}','','',true)"` : isLoading ? '' : `onclick="act('${esc(d.unique_id)}','${isOn ? 'off' : 'on'}')" onpointerdown="startPress('${esc(d.mac)}','${esc(d.unique_id)}','${esc(d.name)}')" onpointerup="cancelPress()" onpointerleave="cancelPress()"`}>
        <div class="flex justify-between items-start">
          <span class="material-symbols-outlined ${isNew ? 'text-secondary text-3xl' : isOn ? 'text-primary text-3xl drop-shadow-[0_0_8px_#00E5FF]' : 'text-outline group-hover:text-primary transition-colors text-3xl'}" ${isOn ? 'style="font-variation-settings: \'FILL\' 1;"' : ''}>
            ${isNew ? 'add_circle' : 'lightbulb'}
          </span>
          ${isNew ? '' : `<div class="w-10 h-5 ${isOn ? 'bg-primary' : 'bg-surface-container-highest border border-outline-variant/40'} relative transition-colors duration-200 pointer-events-none">
            <div class="absolute ${isOn ? 'right-1' : 'left-1'} top-1 w-3 h-3 ${isOn ? 'bg-on-primary' : 'bg-outline'} transition-all duration-200"></div>
          </div>`}
        </div>
        <div>
          <h3 class="font-headline text-lg font-bold">${name}</h3>
          <p class="font-label text-[10px] ${isNew ? 'text-secondary' : isOn ? 'text-primary' : 'text-outline group-hover:text-on-surface-variant'} tracking-widest">${stateLabel}</p>
        </div>
      </div>`;
    }).join('') || '<div class="col-span-4 text-center text-outline font-label text-sm tracking-widest py-8">NO_DEVICES_FOUND</div>';
  }

  async function act(unique_id, status) {
    if (!unique_id || loading.has(unique_id)) return;
    const prev = devices.find(d => d.unique_id === unique_id);
    const prevStatus = prev ? prev.status : null;
    if (prev) prev.status = status;
    loading.add(unique_id);
    render();

    try {
      const res = await fetch('/api/action', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ unique_id, status }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'failed');
      if (prev) prev.status = data.status || status;
      msg(`OK ${unique_id} -> ${data.status}`);
    } catch (e) {
      if (prev && prevStatus !== null) prev.status = prevStatus;
      msg('ACTION_FAILED: ' + e.message);
    } finally {
      loading.delete(unique_id);
      render();
    }
  }

  async function scan() {
    msg('SCANNING...');
    try {
      const res = await fetch('/api/scan', { method: 'POST' });
      const d = await res.json();
      msg(d.ok ? 'SCAN_COMPLETE' : 'SCAN_ERROR');
      await load();
    } catch (e) { msg('SCAN_FAILED: ' + e.message); }
  }

  async function all(status) {
    await Promise.all(devices.filter(d => d.unique_id).map(d => act(d.unique_id, status)));
  }

  function msg(t) { document.getElementById('msg').textContent = t; }

  // --- Modal logic ---
  function openModal(mac, uid, name, isNew) {
    modalMac = mac;
    document.getElementById('modalTitle').textContent = isNew ? 'NEW_DEVICE_DETECTED' : 'UPDATE_DEVICE';
    document.getElementById('modalMac').textContent = 'MAC: ' + mac;
    document.getElementById('modalUid').value = uid || '';
    document.getElementById('modalName').value = name || '';
    document.getElementById('modalErr').classList.add('hidden');
    const modal = document.getElementById('modal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    document.getElementById('modalUid').focus();
  }

  function closeModal() {
    const modal = document.getElementById('modal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
    modalMac = null;
  }

  async function saveDevice() {
    const uid = document.getElementById('modalUid').value.trim();
    const name = document.getElementById('modalName').value.trim();
    const errEl = document.getElementById('modalErr');
    const saveBtn = document.getElementById('modalSave');

    if (!uid || !name) {
      errEl.textContent = 'UNIQUE_ID AND NAME ARE REQUIRED';
      errEl.classList.remove('hidden');
      return;
    }
    errEl.classList.add('hidden');
    saveBtn.textContent = 'SAVING...';
    saveBtn.disabled = true;

    try {
      const res = await fetch('/api/device-update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mac: modalMac, unique_id: uid, name })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'failed');
      msg(`UPDATED ${uid} OK`);
      closeModal();
      await load();
    } catch (e) {
      errEl.textContent = 'ERROR: ' + e.message;
      errEl.classList.remove('hidden');
    } finally {
      saveBtn.textContent = 'SAVE';
      saveBtn.disabled = false;
    }
  }

  // --- Long-press to edit (2 seconds) ---
  function startPress(mac, uid, name) {
    cancelPress();
    pressTimer = setTimeout(() => {
      openModal(mac, uid, name, false);
    }, 2000);
  }

  function cancelPress() {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  }

  // Close modal on Escape
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  load();
</script>
</body>
</html>
